syntax = "proto3";

package entropy.v1;


service EntropyService {

 // Request/response 
 
  rpc GetEntropy(EntropyRequest) returns (EntropyResponse);

  //Server-side streaming, server pushes
  // continuously to the client 
  rpc StreamEntropy(StreamRequest) returns (stream EntropyBlock);

  // get health of da entropy source.
  rpc GetHealthStatus(HealthRequest) returns (HealthResponse);

  // Stream for dashboards for IT folks to monitor
  rpc StreamHealth(HealthRequest) returns (stream HealthMetrics);
}

// =====================================================================
// 1) request/response
// =====================================================================

message EntropyRequest {
  uint32 bytes_requested = 1;        // Number of bytes
  string api_key         = 2;        // Auth
  string format          = 3;        // "raw" | "hex" | "base64"
}

message EntropyResponse {
  bytes  entropy           = 1;      // The certified random bytes
  uint64 block_sequence    = 2;      
  // Monotonic sequence number
  double h_min             = 3;      // Min-entropy of source block
  double rct_pass_rate     = 4;      // Rolling RCT pass rate (0–1)
  double apt_pass_rate     = 5;     
  // Rolling APT pass rate (0–1)
  string certification     = 6;     
  // cert
  int64  timestamp_ns      = 7;      // timestamp
  bytes  block_signature   = 8;      // HSM sig
}

// =====================================================================
// 2) Server-side streaming 
// =====================================================================

message StreamRequest {
  string customer_id   = 1;          // Identify Toeplitz seed
  uint32 target_mbps   = 2;          
  // Requested throughput (genuinely am going to fall asleep)
  string auth_token    = 3;          // mTLS + bearer token
  uint32 block_size    = 4;          // Bytes 
}

message EntropyBlock {
  bytes  entropy           = 1;      // Entropy payload for this block
  uint64 block_sequence    = 2;      // Sequence number (monotonic per stream)
  double h_min             = 3;      // Per-block min-entropy
  bool   rct_passed        = 4;      // RCT health test result
  bool   apt_passed        = 5;      // APT health test result
  int64  timestamp_ns      = 6;     
  // Gen. timestamp
  bytes  attestation       = 7;      // HSM-signed attest.
  string toeplitz_seed_id  = 8;     
  // Identifies seed used
}

// =====================================================================
// Health monitoring
// =====================================================================

message HealthRequest {
  string customer_id = 1;
}

message HealthResponse {
  double current_h_min       = 1;    // Current measured H_min
  double rolling_h_min_mean  = 2;    // Rolling mean over last 1000 blocks
  double rolling_h_min_std   = 3;    
  // Rolling std dev.
  double rct_pass_rate       = 4;
  double apt_pass_rate       = 5;
  uint64 blocks_delivered    = 6;   
  // Total blocs delivered
  uint64 blocks_rejected     = 7;    
  // Total blocqs rejected by health tests
  double pool_depth_gbits    = 8;    // Current pool depth in Gbits
  string source_status       = 9;    // "NOMINAL" | "DEGRADED" | "FAILED"
  int64  uptime_seconds      = 10;   // Server uptime
}

message HealthMetrics {
  double h_min          = 1;
  bool   rct_passed     = 2;
  bool   apt_passed     = 3;
  int64  timestamp_ns   = 4;
  double pool_depth_gbits = 5;
}
